<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Kickoff Meeting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121434;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.75rem;
      color: #ffffff;
      margin-bottom: 8px;
      text-align: center;
    }

    p {
      color: #a0a4c8;
      margin-bottom: 32px;
      text-align: center;
      font-size: 1rem;
    }

    .calendly-wrapper {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* Calendly inline widget begin */
    .calendly-inline-widget {
      min-width: 320px;
      height: 700px;
    }

    .top-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }

    .top-bar img {
      height: 80px;
      width: auto;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img src="https://raw.githubusercontent.com/RampFuel/RampFuelLogo/main/Transparent%20logo.png" alt="RampFuel logo" />
  </div>

  <h1>Schedule a Kickoff Meeting</h1>
  <p>Pick a time that works for you and we'll get things rolling.</p>

  <div class="calendly-wrapper">
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/d/csw4-69t-kt6/kickoff-meeting?text_color=000000&primary_color=5300ff"
    ></div>
  </div>

  <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
